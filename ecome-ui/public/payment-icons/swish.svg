<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 26">
  <!-- Bakgrund -->
  <rect x="0" y="0" width="100" height="26" rx="4"
        fill="rgba(255,255,255,0.9)"
        stroke="rgba(0,0,0,0.08)"/>

  <!-- Swish-gradient -->
  <defs>
    <linearGradient id="swishGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5A2CA0"/>
      <stop offset="20%" stop-color="#D4145A"/>
      <stop offset="40%" stop-color="#FBB03B"/>
      <stop offset="60%" stop-color="#39B54A"/>
      <stop offset="80%" stop-color="#00AEEF"/>
      <stop offset="100%" stop-color="#5A2CA0"/>
    </linearGradient>
  </defs>

  <!-- Ringen -->
  <circle cx="16" cy="13" r="10" fill="none" stroke="url(#swishGradient)" stroke-width="4"/>

  <!-- Text -->
  <text x="38" y="17"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="14"
        font-weight="600"
        fill="#333">
    swish
  </text>
</svg>
